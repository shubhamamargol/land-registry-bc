  <div class="header">

```
<div>
  <span class="badge">Role: User (View Only)</span>

```

  </div>

  <div class="container">

```
<div class="card">

  <h3>View Land Details</h3>

  <input type="number" id="searchId" placeholder="Enter Land ID">

  <button class="action" onclick="getLand()">Get Land</button>

  <div id="landData" class="result"></div>

</div>
```

  </div>

<script>

  if (localStorage.getItem("role") !== "user") {
    alert("Access denied");
    window.location.href = "login.html";
  }

  async function getLand() {

    const id = document.getElementById("searchId").value;

    const response = await fetch(`http://localhost:5000/land/${id}`);
    const data = await response.json();

    document.getElementById("landData").innerHTML = `
    
    <b>Land ID:</b> ${data.id}<br><br>

    <b>Location:</b> ${data.location}<br><br>

    <b>Area:</b> ${data.area} sq.ft<br><br>

    <b>Owner Name:</b> ${data.ownerName}<br><br>

    <b>Owner Address:</b> ${data.ownerAddress}<br><br>

    <b>Blockchain Status:</b> ${data.ownerDisplay}<br><br>

    <b>Registered:</b> ${data.isRegistered}

    `;

  }

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "login.html";
  }

</script>

  <script>
    if (localStorage.getItem("role") !== "user") {
      alert("Access denied");
      window.location.href = "login.html";
    }

    async function getLand() {
      const id = document.getElementById("searchId").value;

      const response = await fetch(`http://localhost:5000/land/${id}`);
      const data = await response.json();

      document.getElementById("landData").innerText =
        JSON.stringify(data, null, 2);
    }

    function logout() {
      localStorage.removeItem("role");
      window.location.href = "login.html";
    }
  </script>
