<!DOCTYPE html>
<html>
<head>
<title>Land Registry System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:40px;
}

.container{
    width:650px;
    margin:auto;
}

.section{
    background:white;
    padding:25px;
    margin-bottom:25px;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
    color:#1f3c88;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

button{
    background:#1f3c88;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#162f6a;
}

.result{
    margin-top:15px;
    background:#f1f1f1;
    padding:12px;
    border-radius:5px;
    line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<div class="section">

<h2>Register Land</h2>

<input type="number" id="landId" placeholder="Land ID">

<input type="text" id="location" placeholder="Location">

<input type="number" id="area" placeholder="Area (sq ft)">

<input type="text" id="ownerName" placeholder="Owner Name">

<input type="text" id="owner" placeholder="Owner Address">

<button onclick="registerLand()">Register Land</button>

<div id="result" class="result"></div>

</div>


<div class="section">

<h2>Transfer Ownership</h2>

<input type="number" id="transferId" placeholder="Land ID">

<input type="text" id="newOwnerName" placeholder="New Owner Name">

<input type="text" id="newOwner" placeholder="New Owner Address">

<button onclick="transferLand()">Transfer Ownership</button>

<div id="transferResult" class="result"></div>

</div>


<div class="section">

<h2>Get Land Details</h2>

<input type="number" id="searchId" placeholder="Enter Land ID">

<button onclick="getLand()">Get Land</button>

<div id="landData" class="result"></div>

</div>

</div>


<script>

async function registerLand(){

  const id = document.getElementById("landId").value;
  const location = document.getElementById("location").value;
  const area = document.getElementById("area").value;
  const ownerName = document.getElementById("ownerName").value;
  const owner = document.getElementById("owner").value;

  try{

    const response = await fetch("http://localhost:5000/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        id,
        location,
        area,
        owner,
        ownerName
      })
    });

    const data = await response.json();

    document.getElementById("result").innerText = data.message;

  }catch(error){

    document.getElementById("result").innerText = error.message;

  }

}

const id=document.getElementById("landId").value;
const location=document.getElementById("location").value;
const area=document.getElementById("area").value;
const owner=document.getElementById("owner").value;
const ownerName=document.getElementById("ownerName").value;

const response=await fetch("http://localhost:5000/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({id,location,area,owner,ownerName})

});

const data=await response.json();

document.getElementById("result").innerHTML=`

<b>${data.message}</b><br><br>

Owner Name: ${data.ownerName}<br>

Transaction Hash: ${data.transactionHash}<br>

Block Hash: ${data.blockHash}

`;




async function transferLand(){

const id=document.getElementById("transferId").value;
const newOwner=document.getElementById("newOwner").value;
const newOwnerName=document.getElementById("newOwnerName").value;

const response=await fetch("http://localhost:5000/transfer",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({id,newOwner,newOwnerName})

});

const data=await response.json();

document.getElementById("transferResult").innerHTML=`

<b>${data.message}</b><br><br>

New Owner: ${data.newOwnerName}<br>

Transaction Hash: ${data.transactionHash}<br>

Block Hash: ${data.blockHash}

`;

}


async function getLand(){

const id=document.getElementById("searchId").value;

const response=await fetch(`http://localhost:5000/land/${id}`);

const data=await response.json();

document.getElementById("landData").innerHTML=`

<b>Land ID:</b> ${data.id}<br><br>

<b>Location:</b> ${data.location}<br><br>

<b>Area:</b> ${data.area} sq.ft<br><br>

<b>Owner Name:</b> ${data.ownerName}<br><br>

<b>Owner Address:</b> ${data.ownerAddress}<br><br>

<b>Blockchain Status:</b> ${data.ownerDisplay}<br><br>

<b>Registered:</b> ${data.isRegistered}

`;

}

</script>

</body>
</html>
