<!DOCTYPE html>
<html>
<head>
  <title>Land Registry - Admin</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f9;
    }

    .header{
      background:#1f3c88;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
    }

    .header button{
      background:#ff4d4d;
      border:none;
      padding:8px 15px;
      color:white;
      border-radius:4px;
      cursor:pointer;
    }

    .container{
      width:80%;
      max-width:800px;
      margin:30px auto;
    }

    .card{
      background:white;
      padding:25px;
      margin-bottom:25px;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:8px;
      margin-bottom:10px;
      border-radius:4px;
      border:1px solid #ccc;
    }

    button.action{
      background:#1f3c88;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:4px;
      cursor:pointer;
    }

    button.action:hover{
      background:#162f6a;
    }

    .result{
      margin-top:10px;
      background:#f0f0f0;
      padding:10px;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Land Registry - Admin Panel</h2>
  <div>
    Role: Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div class="card">
<h3>Register Land</h3>

<input type="number" id="landId" placeholder="Land ID">
<input type="text" id="location" placeholder="Location">
<input type="number" id="area" placeholder="Area">
<input type="text" id="ownerName" placeholder="Owner Name">
<input type="text" id="owner" placeholder="Owner Wallet Address">

<button class="action" onclick="registerLand()">Register</button>

<div id="result" class="result"></div>
</div>


<div class="card">
<h3>Transfer Ownership</h3>

<input type="number" id="transferId" placeholder="Land ID">
<input type="text" id="newOwnerName" placeholder="New Owner Name">
<input type="text" id="newOwner" placeholder="New Owner Address">

<button class="action" onclick="transferLand()">Transfer</button>

<div id="transferResult" class="result"></div>
</div>


<div class="card">
<h3>View Land Details</h3>

<input type="number" id="searchId" placeholder="Enter Land ID">

<button class="action" onclick="getLand()">Get Land</button>

<div id="landData" class="result"></div>
</div>

</div>


<script>

if(localStorage.getItem("role") !== "admin"){
  alert("Access denied");
  window.location.href="login.html";
}

async function registerLand(){

  const id=document.getElementById("landId").value;
  const location=document.getElementById("location").value;
  const area=document.getElementById("area").value;
  const owner=document.getElementById("owner").value;
  const ownerName=document.getElementById("ownerName").value;

  const response=await fetch("http://localhost:5000/register",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({id,location,area,owner,ownerName})
  });

  const data=await response.json();

  document.getElementById("result").innerHTML=`
  <b>${data.message}</b><br><br>
  Owner Name: ${ownerName}<br>
  Transaction Hash: ${data.transactionHash}<br>
  Block Hash: ${data.blockHash}
  `;
}


async function transferLand(){

  const id=document.getElementById("transferId").value;
  const newOwner=document.getElementById("newOwner").value;
  const newOwnerName=document.getElementById("newOwnerName").value;

  const response=await fetch("http://localhost:5000/transfer",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
   body: JSON.stringify({
  id,
  newOwner,
  newOwnerName})
  });

  const data=await response.json();

  document.getElementById("transferResult").innerHTML=`
  <b>${data.message}</b><br><br>
  New Owner: ${newOwnerName}<br>
  Transaction Hash: ${data.transactionHash}<br>
  Block Hash: ${data.blockHash}
  `;
}


async function getLand(){

  const id=document.getElementById("searchId").value;

  const response=await fetch(`http://localhost:5000/land/${id}`);

  const data=await response.json();

  document.getElementById("landData").innerHTML=`
  <b>Land ID:</b> ${data.id}<br><br>
  <b>Location:</b> ${data.location}<br><br>
  <b>Area:</b> ${data.area}<br><br>
  <b>Owner Address:</b> ${data.ownerAddress}<br><br>
  <b>Status:</b> ${data.isRegistered}
  `;
}

function logout(){
  localStorage.removeItem("role");
  window.location.href="login.html";
}

</script>

</body>
</html>
